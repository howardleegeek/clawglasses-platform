[project]
id = ""  # Fill in after `supabase link`

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://clawglasses.com"]

[auth.email]
enable_signup = false  # We use wallet-based auth, not email

